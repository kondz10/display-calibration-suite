<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Display Calibration Suite</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #080808;
      --surface: #0f0f0f;
      --surface2: #141414;
      --border:  #1e1e1e;
      --accent:  #8b15ba;
      --accent3: #33ff33;
      --warn:    #ff9100;
      --text:    #e0e0e0;
      --muted:   #555555;
      --text2:   #777777;
      --text3:   #3a3a3a;
      --mono: 'Share Tech Mono', monospace;
      --sans: 'Rajdhani', sans-serif;
      --radius: 10px;
    }
    /* ── Light theme — purple accents preserved ── */
    body.light {
      --bg:      #f4f4f7;
      --surface: #ffffff;
      --surface2: #eef0f3;
      --border:  #d6d8de;
      --accent:  #8b15ba;
      --accent3: #1a9e1a;
      --warn:    #d97500;
      --text:    #1a1a1c;
      --muted:   #8c8c94;
      --text2:   #62626a;
      --text3:   #b4b4bc;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; scrollbar-width: none; }
::-webkit-scrollbar { display: none; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(139,21,186,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139,21,186,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* ── Scrollbar ──
    ::-webkit-scrollbar { width: 6px; height: 6px; display: none; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); } */

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      width: 100%;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .header-top {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      padding: 18px 24px 14px;
      position: relative;
      z-index: 1;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      border: 1px solid var(--accent);
      border-radius: 10px;
      padding: 7px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px;
      flex-shrink: 0;
    }
    .logo-icon span { border-radius: 2px; display: block; }
    .lr { background: #ff3333; }
    .lg { background: #33ff33; }
    .lb { background: #3333ff; }
    .lw { background: #ffffff; }

    .header-text { text-align: left; }

    .header-text h1 {
      font-family: var(--mono);
      font-size: 22px;
      letter-spacing: 5px;
      color: var(--accent);
      text-transform: uppercase;
    }

    .header-sub {
      font-family: var(--sans);
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 2px;
      margin-top: 6px;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 6px;
      justify-content: center;
      position: relative;
      bottom: -1px;
      padding: 0 24px;
    }

    .tab {
      height: 42px;
      padding: 0 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 10px 10px 0 0;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      transition: color .18s, border-color .18s, background .18s;
    }

    .tab-num {
      font-size: 9px;
      color: var(--text3);
      letter-spacing: 1px;
      transition: color .18s;
    }

    .tab:hover {
      color: var(--text2);
      background: var(--surface2);
      border-color: #2a2a2a;
    }

    .tab.active {
      color: var(--accent);
      background: var(--bg);
      border-color: var(--accent);
      border-bottom: 1px solid var(--bg);
    }

    .tab.active .tab-num {
      color: var(--accent);
      opacity: 0.6;
    }

    /* ── Main ── */
    main {
      position: relative;
      z-index: 1;
      width: 100%;
    }

    /* ── App panels ── */
    .app-panel {
      display: none;
      width: 100%;
      min-height: calc(100vh - 160px);
    }

    .app-panel.active {
      display: block;
      animation: fadeIn .2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: none; }
    }

    .app-panel iframe {
      width: 60%;
      max-width: 60%;
      margin: 0 auto;
      min-height: calc(100vh - 160px);
      border: none;
      display: block;
    }

    @media (max-width: 1100px) {
      .app-panel iframe { width: 100%; max-width: 100%; }
    }

    /* Apps that need the full page width (e.g. False Color Viewer) */
    .app-panel.app-fullwidth iframe {
      width: 100%;
      max-width: 100%;
    }

    /* ── Shell fullscreen mode ── */
    body.shell-fs { overflow: hidden; }
    body.shell-fs header { display: none; }
    body.shell-fs .app-panel,
    body.shell-fs .app-panel iframe {
      width: 100%;
      max-width: 100%;
      min-height: 100vh;
      height: 100vh;
    }

    /* ── Fullscreen toggle button (in header) ── */
    .btn-shell-fs {
      position: absolute;
      right: 24px;
      top: 50%;
      transform: translateY(-50%);
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text3);
      cursor: pointer;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color .18s, border-color .18s;
      flex-shrink: 0;
    }
    .btn-shell-fs:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* ── Animated sun/moon day–night theme switch (in header) ── */
    .btn-shell-theme {
      position: absolute;
      right: 60px;
      top: 50%;
      transform: translateY(-50%);
      width: 64px;
      height: 30px;
      padding: 0;
      border: none;
      background: none;
      cursor: pointer;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .ts-track {
      position: relative;
      display: block;
      width: 64px;
      height: 30px;
      border-radius: 30px;
      overflow: hidden;
      /* default = DARK theme = night sky */
      background: linear-gradient(160deg, #1b2950 0%, #0c1430 100%);
      box-shadow: inset 0 1px 3px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.06);
      transition: background .9s ease, box-shadow .9s ease;
    }
    body.light .ts-track {
      /* LIGHT theme = day sky */
      background: linear-gradient(160deg, #5fb0ef 0%, #9fd4f5 100%);
      box-shadow: inset 0 1px 3px rgba(0,0,0,.18), 0 0 0 1px rgba(255,255,255,.5);
    }
    /* Stars (night) */
    .ts-stars, .ts-stars::before, .ts-stars::after {
      position: absolute; border-radius: 50%; background: #fff;
    }
    .ts-stars {
      width: 2px; height: 2px; top: 7px; left: 12px; opacity: .9;
      box-shadow: 8px 4px 0 -0.3px #fff, 16px -2px 0 -0.6px #fff,
                  4px 12px 0 -0.6px #fff, 20px 9px 0 -0.3px #fff,
                  13px 14px 0 -0.7px #fff;
      transition: opacity .9s ease;
    }
    body.light .ts-stars { opacity: 0; }
    /* Clouds (day) */
    .ts-clouds {
      position: absolute; left: 4px; bottom: 3px;
      width: 26px; height: 12px; opacity: 0;
      background:
        radial-gradient(circle at 6px 8px, #fff 5px, transparent 5.5px),
        radial-gradient(circle at 13px 6px, #fff 6px, transparent 6.5px),
        radial-gradient(circle at 20px 9px, #fff 5px, transparent 5.5px);
      filter: drop-shadow(0 1px 1px rgba(0,0,0,.06));
      transition: opacity .9s ease;
    }
    body.light .ts-clouds { opacity: .92; }
    /* Thumb = moon (dark) / sun (light) */
    .ts-thumb {
      position: absolute; top: 4px; left: 4px;
      width: 22px; height: 22px; border-radius: 50%;
      /* default = MOON */
      background: radial-gradient(circle at 35% 35%, #eef0f5 0%, #c4c8d2 70%, #aab0bd 100%);
      box-shadow: 0 2px 4px rgba(0,0,0,.45), inset -2px -2px 3px rgba(0,0,0,.18);
      transform: translateX(34px);
      transition: transform .9s ease, background .9s ease, box-shadow .9s ease;
    }
    /* moon craters */
    .ts-thumb::before {
      content: ''; position: absolute; border-radius: 50%;
      width: 5px; height: 5px; top: 5px; left: 11px;
      background: #aeb4c0;
      box-shadow: -6px 4px 0 -1px #aeb4c0, 2px 8px 0 -1.5px #aeb4c0;
      opacity: 1; transition: opacity .9s ease;
    }
    body.light .ts-thumb {
      /* SUN */
      background: radial-gradient(circle at 38% 35%, #fff7cc 0%, #ffd21a 45%, #ff9d00 100%);
      box-shadow: 0 0 6px 2px rgba(255,193,7,.75), 0 0 14px 4px rgba(255,160,0,.45), inset -1px -1px 2px rgba(200,120,0,.3);
      transform: translateX(0);
    }
    body.light .ts-thumb::before { opacity: 0; }
    .btn-shell-theme:hover .ts-thumb { filter: brightness(1.06); }
    /* Coordinated, uniform colour fade during theme switch (excludes the switch itself) */
    html.theme-anim,
    body.theme-anim,
    body.theme-anim *:not(.ts-thumb):not(.ts-track):not(.ts-stars):not(.ts-clouds) {
      transition: background-color .9s ease, color .9s ease, border-color .9s ease, fill .9s ease, box-shadow .9s ease !important;
    }

    /* ── Exit fullscreen floating button ── */
    .fs-exit-btn {
      display: none;
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 9999;
      padding: 7px 12px;
      background: rgba(8,8,8,0.92);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      align-items: center;
      gap: 8px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s, color .18s, border-color .18s;
    }
    body.shell-fs .fs-exit-btn { display: flex; }
    body.shell-fs:hover .fs-exit-btn {
      opacity: 1;
      pointer-events: all;
    }
    /* While a measurement overlay is active in an app, keep the screen perfectly
       clean — hide the exit button entirely, even on hover. */
    body.measuring .fs-exit-btn {
      opacity: 0 !important;
      pointer-events: none !important;
    }
    .fs-exit-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
    }
  </style>
</head>
<body>
  <header>
    <div class="header-top">
      <button class="btn-shell-fs" id="btn-shell-fs" title="Fullscreen (F)" onclick="toggleShellFS()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M1 5V1h4M9 1h4v4M13 9v4h-4M5 13H1V9"/>
        </svg>
      </button>
      <button class="btn-shell-theme" id="btn-shell-theme" title="Motyw jasny/ciemny" aria-label="Przełącz motyw dzień/noc">
        <span class="ts-track">
          <span class="ts-stars"></span>
          <span class="ts-clouds"></span>
          <span class="ts-thumb"></span>
        </span>
      </button>
      <div class="logo-icon">
        <span class="lr"></span>
        <span class="lg"></span>
        <span class="lb"></span>
        <span class="lw"></span>
      </div>
      <div class="header-text">
        <h1>Display Calibration Suite</h1>
        <p class="header-sub">Professional Display Measurement &amp; Profiling Tools</p>
      </div>
    </div>
    <nav class="tabs">
      <button class="tab active" onclick="switchApp(0)">
        <span class="tab-num">01</span>Display Calibrator
      </button>
      <button class="tab" onclick="switchApp(1)">
        <span class="tab-num">02</span>Spectral Analyzer
      </button>
      <button class="tab" onclick="switchApp(2)">
        <span class="tab-num">03</span>Chromatic Data Analyzer
      </button>
      <button class="tab" onclick="switchApp(3)">
        <span class="tab-num">04</span>Calibration Preview
      </button>
      <button class="tab" onclick="switchApp(4)">
        <span class="tab-num">05</span>False Color Viewer
      </button>
      <button class="tab" onclick="switchApp(5)">
        <span class="tab-num">06</span>TI3 · Argyll Profiler
      </button>
      <button class="tab" onclick="switchApp(6)">
        <span class="tab-num">07</span>Color Calculator
      </button>
      <button class="tab" onclick="switchApp(7)">
        <span class="tab-num">08</span>Gamma Analyzer
      </button>
      <button class="tab" onclick="switchApp(8)">
        <span class="tab-num">09</span>Gamut Scope
      </button>
    </nav>
  </header>

  <main>
    <div id="app-1" class="app-panel active">
      <iframe src="display calibrator/index (73).html" title="Display Calibrator" allowfullscreen></iframe>
    </div>
    <div id="app-2" class="app-panel">
      <iframe src="Spectral analyzer/index (67).html" title="Spectral Analyzer" allowfullscreen></iframe>
    </div>
    <div id="app-3" class="app-panel">
      <iframe src="Chromatic Data Analyser/index_renamed (2).html" title="Chromatic Data Analyzer" allowfullscreen></iframe>
    </div>
    <div id="app-4" class="app-panel">
      <iframe src="Calibration Preview/index.html" title="Calibration Preview" allowfullscreen></iframe>
    </div>
    <div id="app-5" class="app-panel app-fullwidth">
      <iframe src="False Color Viewer/False Color Viever.html" title="False Color Viewer" allowfullscreen allow="fullscreen"></iframe>
    </div>
    <div id="app-6" class="app-panel">
      <iframe src="TI3/ti3gen_v6.html" title="TI3 Argyll Display Profiler" allowfullscreen></iframe>
    </div>
    <div id="app-7" class="app-panel">
      <iframe src="Colour Calculator/colour_calculator_v2.html" title="Color Calculator" allowfullscreen></iframe>
    </div>
    <div id="app-8" class="app-panel">
      <iframe src="Gamma analyzer/gamma_calibrator_v7.html" title="Gamma Analyzer" allowfullscreen></iframe>
    </div>
    <div id="app-9" class="app-panel">
      <iframe src="Gamut Scope/gamut_scope_v2 (4).html" title="Gamut Scope" allowfullscreen></iframe>
    </div>
  </main>

  <button class="fs-exit-btn" id="fs-exit-btn" onclick="exitShellFS()">
    <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <path d="M1 1l8 8M9 1l-8 8"/>
    </svg>
    Exit Fullscreen
  </button>

  <script>
    function switchApp(n) {
      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === n));
      document.querySelectorAll('.app-panel').forEach((p, i) => p.classList.toggle('active', i === n));
      localStorage.setItem('activeApp', n);
    }

    function enterShellFS() {
      document.body.classList.add('shell-fs');
    }

    function exitShellFS() {
      document.body.classList.remove('shell-fs');
    }

    function toggleShellFS() {
      document.body.classList.toggle('shell-fs');
    }

    // ── Global theme (dark ↔ light) for the whole suite ──
    function suiteThemeIsLight() {
      try { return localStorage.getItem('suite-theme') === 'light'; } catch(e) { return false; }
    }
    function broadcastTheme(light) {
      // Apply the class DIRECTLY and synchronously to every same-origin iframe in one
      // tick, so all transitions start simultaneously. postMessage is async (arrives at
      // different times → desync), so we use it only as a fallback / to trigger re-renders.
      document.querySelectorAll('.app-panel iframe').forEach(f => {
        let direct = false;
        try {
          const doc = f.contentDocument;
          if (doc && doc.body) {
            doc.documentElement.classList.add('theme-anim');
            doc.body.classList.add('theme-anim');
            doc.body.classList.toggle('light', light);
            clearTimeout(f.__themeAnimT);
            f.__themeAnimT = setTimeout(() => {
              try {
                doc.documentElement.classList.remove('theme-anim');
                doc.body.classList.remove('theme-anim');
              } catch(e) {}
            }, 950);
            direct = true;
          }
        } catch(e) {}
        // Message: triggers canvas re-renders in diagram tools; applies theme if direct failed
        try { f.contentWindow.postMessage({ type: 'suite-theme', light: light, noToggle: direct }, '*'); } catch(e) {}
      });
    }
    let __animTimer = null;
    function applySuiteTheme(light) {
      // Coordinated uniform fade: add anim class to html+body, toggle, broadcast, then clean up
      document.documentElement.classList.add('theme-anim');
      document.body.classList.add('theme-anim');
      document.body.classList.toggle('light', light);
      try { localStorage.setItem('suite-theme', light ? 'light' : 'dark'); } catch(e) {}
      broadcastTheme(light);
      clearTimeout(__animTimer);
      __animTimer = setTimeout(() => {
        document.documentElement.classList.remove('theme-anim');
        document.body.classList.remove('theme-anim');
      }, 950);
    }
    function toggleSuiteTheme() {
      applySuiteTheme(!document.body.classList.contains('light'));
    }
    // Click + drag interaction on the day/night switch
    (function(){
      const btn = document.getElementById('btn-shell-theme');
      if (!btn) return;
      let down=false, startX=0, moved=false;
      btn.addEventListener('pointerdown', e => { down=true; moved=false; startX=e.clientX; });
      window.addEventListener('pointermove', e => {
        if(!down) return;
        if(Math.abs(e.clientX-startX) > 6) moved=true;
      });
      window.addEventListener('pointerup', e => {
        if(!down) return; down=false;
        if(moved){
          // decide by drag direction: right→night(dark), left→day(light)
          const goLight = (e.clientX - startX) < 0;
          applySuiteTheme(goLight);
        } else {
          toggleSuiteTheme(); // simple click
        }
      });
    })();
    // Re-send theme to an iframe once it finishes loading (e.g. first view of a tab)
    document.querySelectorAll('.app-panel iframe').forEach(f => {
      f.addEventListener('load', () => {
        const light = suiteThemeIsLight();
        try { f.contentWindow.postMessage({ type: 'suite-theme', light: light }, '*'); } catch(e) {}
      });
    });
    // Apply saved theme on shell load
    applySuiteTheme(suiteThemeIsLight());

    document.addEventListener('keydown', e => {
      const tag = document.activeElement && document.activeElement.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA') return;
      if (e.key === 'f' || e.key === 'F') toggleShellFS();
      if (e.key === 'Escape') exitShellFS();
    });

    window.addEventListener('message', e => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === 'shellFS') {
        if (e.data.on) enterShellFS();
        else exitShellFS();
      }
      // App (e.g. Display Calibrator) entered/left a fullscreen measurement overlay
      if (e.data.source === 'dcs-calibrator') {
        document.body.classList.toggle('measuring', !!e.data.measuring);
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      const saved = parseInt(localStorage.getItem('activeApp') || '0');
      switchApp(saved);
    });
  </script>
</body>
</html>
